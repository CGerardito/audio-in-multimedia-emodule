<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio in Multimedia — E-Module</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Redirect non-root direct accesses to the landing page.
      // This handles refresh/bookmark/shared-link scenarios on GitHub Pages.
      (function() {
        var basePath = '/audio-in-multimedia-emodule/'
        var path = window.location.pathname

        // Normalize for comparison (remove trailing slash)
        var normalizedPath = path.endsWith('/') ? path.slice(0, -1) : path
        var normalizedBase = basePath.endsWith('/') ? basePath.slice(0, -1) : basePath

        // If not at root, redirect to landing
        if (normalizedPath !== normalizedBase) {
          window.location.replace(basePath)
        }
      })()
    </script>
  </body>
</html>
